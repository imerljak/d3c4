name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push version commits + create git tags
      pull-requests: write  # open/update the "Version Packages" PR
      id-token: write       # exchange GitHub OIDC token for npm granular access token

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so changesets can diff tags
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      # Pending changeset files  → open/update the "Version Packages" PR
      # No pending changesets    → publish to npm (after the PR was merged)
      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish --provenance
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
